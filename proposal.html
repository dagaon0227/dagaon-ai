<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 제안서 — DAGAON AI</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- Marked (markdown parser) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <!-- PptxGenJS (PPT export) -->
  <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS/dist/pptxgen.bundle.js"></script>

  <!-- html2pdf (PDF export) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    /* ─────────────────────────────────────────
       ROOT & RESET
    ───────────────────────────────────────── */
    :root {
      --black:    #050505;
      --deep:     #0a0a0a;
      --surface:  #111111;
      --surface2: #1a1a1a;
      --border:   rgba(255,255,255,0.07);
      --white:    #ffffff;
      --silver:   #c8c8c8;
      --gold:     #b8975a;
      --gold-lt:  #d4af70;
      --text:     #d0d0d0;
      --serif:    'Noto Serif KR', serif;
      --sans:     'Noto Sans KR', sans-serif;
      --sidebar-w: 260px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; height: 100%; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--sans);
      font-weight: 400;
      height: 100%;
      overflow: hidden;
      cursor: default;
    }

    /* ── Scrollbar ─────────────────────────── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(184,151,90,.3); border-radius: 2px; }

    /* ── Selection ─────────────────────────── */
    ::selection { background: var(--gold); color: var(--black); }

    /* ─────────────────────────────────────────
       LAYOUT
    ───────────────────────────────────────── */
    #app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ─────────────────────────────────────────
       SIDEBAR
    ───────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--deep);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 18px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-logo {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; margin-bottom: 16px;
    }
    .sidebar-logo-text {
      font-family: var(--serif);
      font-size: .82rem;
      letter-spacing: .18em;
      color: var(--white);
      font-weight: 400;
    }
    .sidebar-logo-text span { color: var(--gold); }

    .sidebar-back {
      display: flex; align-items: center; gap: 6px;
      text-decoration: none;
      color: rgba(208,208,208,.4);
      font-size: .65rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 14px;
      transition: color .2s;
    }
    .sidebar-back:hover { color: var(--gold); }

    .btn-new-chat {
      width: 100%;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: transparent;
      border: 1px solid rgba(184,151,90,.35);
      color: var(--gold);
      font-family: var(--sans);
      font-size: .76rem;
      letter-spacing: .1em;
      cursor: pointer;
      transition: background .2s, border-color .2s;
    }
    .btn-new-chat:hover { background: rgba(184,151,90,.07); border-color: var(--gold); }

    .sidebar-section-title {
      font-size: .58rem;
      letter-spacing: .26em;
      text-transform: uppercase;
      color: rgba(184,151,90,.55);
      padding: 16px 18px 8px;
      flex-shrink: 0;
    }

    /* Engine Dropdown */
    .engine-dropdown { padding: 8px 10px; position: relative; flex-shrink: 0; }
    .engine-dd-trigger {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 11px;
      background: #111;
      border: 1px solid rgba(184,151,90,.45);
      border-radius: 6px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      user-select: none;
    }
    .engine-dd-trigger:hover { border-color: rgba(184,151,90,.7); background: rgba(184,151,90,.04); }
    .engine-dd-arrow {
      margin-left: auto;
      font-size: .6rem;
      color: rgba(184,151,90,.7);
      transition: transform .25s;
      flex-shrink: 0;
    }
    .engine-dropdown.open .engine-dd-arrow { transform: rotate(180deg); }
    .engine-dd-menu {
      overflow: hidden;
      max-height: 0;
      transition: max-height .3s ease;
      background: #0e0e0e;
      border: 1px solid rgba(184,151,90,.25);
      border-top: none;
      border-radius: 0 0 6px 6px;
    }
    .engine-dropdown.open .engine-dd-menu { max-height: 480px; }
    .engine-dd-inner { padding: 4px 6px 6px; }
    .engine-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 9px;
      cursor: pointer;
      border: 1px solid transparent;
      border-radius: 4px;
      margin-bottom: 2px;
      transition: background .15s, border-color .15s;
      position: relative;
    }
    .engine-item:hover { background: rgba(255,255,255,.04); }
    .engine-item.active {
      background: rgba(184,151,90,.08);
      border-color: rgba(184,151,90,.4);
    }
    .engine-item.locked { opacity: 0.45; }
    .engine-item.locked .eng-lock { display: inline-flex; align-items: center; color: #888; margin-left: 4px; font-size: .58rem; }
    .engine-item:not(.locked) .eng-lock { display: none; }
    .engine-badge {
      width: 30px; height: 30px;
      border-radius: 7px;
      display: grid; place-items: center;
      font-size: .68rem;
      font-weight: 700;
      font-family: var(--serif);
      flex-shrink: 0;
      letter-spacing: .04em;
    }
    .badge-gpt   { background: rgba(16,163,127,.18); color: #10a37f; }
    .badge-mini  { background: rgba(16,163,127,.12); color: rgba(16,163,127,.8); }
    .badge-gem   { background: rgba(66,133,244,.18); color: #4285f4; }
    .badge-claude{ background: rgba(204,120,92,.18); color: #cc785c; }
    .badge-llama { background: rgba(100,149,237,.18); color: #6495ed; }
    .engine-info { flex: 1; min-width: 0; }
    .engine-name {
      font-size: .78rem;
      color: var(--white);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .engine-desc {
      font-size: .62rem;
      color: rgba(208,208,208,.45);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .engine-new-badge {
      font-size: .48rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      background: var(--gold);
      color: var(--black);
      padding: 2px 5px;
      font-weight: 700;
      flex-shrink: 0;
      border-radius: 2px;
    }

    /* Conversation history section */
    .sidebar-section-title-history {
      font-size: .58rem;
      letter-spacing: .26em;
      text-transform: uppercase;
      color: rgba(184,151,90,.55);
      padding: 12px 18px 8px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .conv-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 10px 10px;
    }
    .conv-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px;
      cursor: pointer;
      border-radius: 4px;
      margin-bottom: 2px;
      transition: background .2s;
      color: rgba(208,208,208,.55);
      font-size: .73rem;
    }
    .conv-item:hover { background: rgba(255,255,255,.03); color: var(--text); }
    .conv-item.active { background: rgba(184,151,90,.06); color: var(--white); }
    .conv-item i { font-size: .65rem; color: rgba(184,151,90,.4); flex-shrink: 0; }
    .conv-item-text {
      flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .conv-item-del {
      flex-shrink: 0;
      width: 18px; height: 18px;
      display: none; place-items: center;
      border-radius: 3px;
      cursor: pointer;
      font-size: .6rem;
      color: rgba(208,208,208,.3);
      transition: color .15s, background .15s;
    }
    .conv-item:hover .conv-item-del { display: grid; }
    .conv-item-del:hover { color: #e07070; background: rgba(220,80,80,.12); }
    .conv-empty {
      padding: 12px 18px;
      font-size: .7rem;
      color: rgba(208,208,208,.25);
      font-style: italic;
    }
    .conv-clear-btn {
      display: flex; align-items: center; gap: 5px;
      margin: 4px 10px 6px;
      padding: 5px 9px;
      border: 1px solid rgba(184,151,90,.2);
      border-radius: 4px;
      background: transparent;
      color: rgba(184,151,90,.5);
      font-family: var(--sans);
      font-size: .62rem;
      cursor: pointer;
      transition: all .18s;
    }
    .conv-clear-btn:hover { border-color: rgba(220,80,80,.4); color: #e07070; background: rgba(220,80,80,.06); }

    .sidebar-footer {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .user-info {
      display: flex; align-items: center; gap: 10px;
    }
    .user-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: rgba(184,151,90,.15);
      border: 1px solid rgba(184,151,90,.3);
      display: grid; place-items: center;
      font-size: .7rem;
      color: var(--gold);
      flex-shrink: 0;
    }
    .user-name {
      font-size: .78rem;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-plan-badge {
      font-size: .55rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 3px 7px;
      font-weight: 700;
    }
    .badge-unlimited {
      background: var(--gold);
      color: var(--black);
    }
    .badge-count {
      background: rgba(255,255,255,.08);
      color: rgba(208,208,208,.7);
      border: 1px solid rgba(255,255,255,.1);
    }

    /* ─────────────────────────────────────────
       MAIN CHAT AREA
    ───────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--black);
    }

    /* Chat header */
    #chat-header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
      background: var(--deep);
      gap: 12px;
    }
    .chat-header-left {
      display: flex; align-items: center; gap: 10px;
    }
    .chat-engine-name {
      font-family: var(--serif);
      font-size: 1rem;
      color: var(--white);
      font-weight: 400;
      display: flex; align-items: center; gap: 10px;
    }
    .chat-engine-name i {
      color: var(--gold);
      font-size: .85rem;
    }
    #chat-plan-badge {
      font-size: .6rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: 4px 10px;
      font-weight: 700;
    }
    .header-export-btns {
      display: flex; gap: 8px; align-items: center;
    }
    .export-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      background: transparent;
      border: 1px solid rgba(255,255,255,.1);
      color: rgba(208,208,208,.6);
      font-family: var(--sans);
      font-size: .68rem;
      letter-spacing: .08em;
      cursor: pointer;
      transition: border-color .2s, color .2s, background .2s;
      border-radius: 4px;
    }
    .export-btn:hover {
      border-color: rgba(184,151,90,.4);
      color: var(--gold);
      background: rgba(184,151,90,.05);
    }

    /* Messages area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
      display: flex;
      flex-direction: column;
    }

    .msg-row {
      padding: 0 24px;
      margin-bottom: 24px;
      display: flex;
      gap: 14px;
    }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: .8rem;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg-avatar.ai {
      background: rgba(184,151,90,.12);
      border: 1px solid rgba(184,151,90,.25);
      color: var(--gold);
    }
    .msg-avatar.user-av {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      color: rgba(208,208,208,.7);
    }

    .msg-bubble {
      max-width: 78%;
      padding: 14px 18px;
      line-height: 1.85;
      font-size: .88rem;
      font-weight: 400;
    }
    .msg-bubble.ai {
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 0 12px 12px 12px;
      color: var(--text);
    }
    .msg-bubble.user {
      background: rgba(184,151,90,.1);
      border: 1px solid rgba(184,151,90,.22);
      border-radius: 12px 0 12px 12px;
      color: var(--white);
    }

    /* Markdown styles inside AI bubble */
    .msg-bubble.ai strong { color: var(--white); }
    .msg-bubble.ai em { color: var(--gold-lt); }
    .msg-bubble.ai code {
      background: rgba(255,255,255,.07);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: .82rem;
      font-family: 'Courier New', monospace;
      color: #e8d5a3;
    }
    .msg-bubble.ai pre {
      background: rgba(0,0,0,.4);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 6px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .msg-bubble.ai pre code {
      background: none;
      padding: 0;
      font-size: .82rem;
      color: #d4d4d4;
    }
    .msg-bubble.ai ul, .msg-bubble.ai ol {
      padding-left: 20px;
      margin: 8px 0;
    }
    .msg-bubble.ai li { margin-bottom: 4px; }
    .msg-bubble.ai p { margin-bottom: 8px; }
    .msg-bubble.ai p:last-child { margin-bottom: 0; }
    .msg-bubble.ai h1, .msg-bubble.ai h2, .msg-bubble.ai h3 {
      font-family: var(--serif);
      color: var(--white);
      margin: 10px 0 6px;
    }
    .msg-bubble.ai blockquote {
      border-left: 2px solid var(--gold);
      padding-left: 12px;
      color: rgba(208,208,208,.7);
      margin: 8px 0;
    }
    .msg-bubble.ai hr {
      border: none;
      border-top: 1px solid rgba(184,151,90,.2);
      margin: 12px 0;
    }

    /* ─── Slide cards ─── */
    .slide-cards-wrapper {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 14px;
    }
    .slide-card {
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(184,151,90,.28);
      border-radius: 10px;
      overflow: hidden;
    }
    .slide-card-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
      background: rgba(184,151,90,.06);
      border-bottom: 1px solid rgba(184,151,90,.18);
    }
    .slide-card-num {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: rgba(184,151,90,.15);
      border: 1px solid rgba(184,151,90,.35);
      display: grid; place-items: center;
      font-size: .62rem;
      font-weight: 700;
      color: var(--gold);
      flex-shrink: 0;
      font-family: var(--serif);
    }
    .slide-card-title {
      font-family: var(--serif);
      font-size: .85rem;
      color: var(--white);
      font-weight: 500;
      letter-spacing: .04em;
    }
    .slide-card-body {
      padding: 14px 16px;
      font-size: .84rem;
      color: var(--text);
      line-height: 1.9;
    }
    .slide-card-body p { margin-bottom: 6px; }
    .slide-card-body p:last-child { margin-bottom: 0; }
    .slide-card-body ul, .slide-card-body ol { padding-left: 18px; margin: 6px 0; }
    .slide-card-body li { margin-bottom: 3px; }
    .slide-card-body strong { color: var(--white); }
    .slide-card-body em { color: var(--gold-lt); }

    /* Typing dots */
    .typing-dots {
      display: flex; gap: 5px; align-items: center;
      padding: 4px 2px;
    }
    .typing-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      opacity: .5;
      animation: typingPulse 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes typingPulse {
      0%,100% { opacity: .25; transform: translateY(0); }
      50%      { opacity: .85; transform: translateY(-3px); }
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      gap: 16px;
    }
    .empty-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(184,151,90,.08);
      border: 1px solid rgba(184,151,90,.2);
      display: grid; place-items: center;
      font-size: 1.6rem;
      color: var(--gold);
    }
    .empty-title {
      font-family: var(--serif);
      font-size: 1.4rem;
      color: var(--white);
      font-weight: 300;
    }
    .empty-sub {
      font-size: .84rem;
      color: rgba(208,208,208,.5);
      max-width: 360px;
      line-height: 1.8;
    }
    .suggestion-chips {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }
    .suggestion-chip {
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,.1);
      background: transparent;
      color: rgba(208,208,208,.7);
      font-family: var(--sans);
      font-size: .76rem;
      cursor: pointer;
      transition: border-color .2s, color .2s, background .2s;
      border-radius: 20px;
    }
    .suggestion-chip:hover {
      border-color: rgba(184,151,90,.5);
      color: var(--gold);
      background: rgba(184,151,90,.05);
    }

    /* ─────────────────────────────────────────
       INPUT AREA
    ───────────────────────────────────────── */
    #input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--deep);
    }
    .input-wrapper {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color .2s;
    }
    .input-wrapper:focus-within {
      border-color: rgba(184,151,90,.5);
    }

    #msg-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--white);
      font-family: var(--sans);
      font-size: .9rem;
      resize: none;
      line-height: 1.6;
      min-height: 28px;
      max-height: 160px;
      overflow-y: auto;
    }
    #msg-input::placeholder { color: rgba(208,208,208,.3); }

    .input-actions {
      display: flex; align-items: center; justify-content: space-between;
    }
    .input-credit-hint {
      font-size: .65rem;
      color: rgba(184,151,90,.5);
      letter-spacing: .04em;
    }

    #send-btn {
      width: 36px; height: 36px;
      background: var(--gold);
      border: none;
      border-radius: 8px;
      color: var(--black);
      cursor: pointer;
      display: grid; place-items: center;
      font-size: .88rem;
      transition: background .2s, transform .15s;
    }
    #send-btn:hover { background: var(--gold-lt); transform: scale(1.05); }
    #send-btn:disabled {
      background: rgba(184,151,90,.3);
      cursor: not-allowed;
      transform: none;
    }

    .input-hint {
      font-size: .65rem;
      color: rgba(208,208,208,.3);
      text-align: center;
      margin-top: 8px;
      letter-spacing: .04em;
    }

    /* ─────────────────────────────────────────
       UPGRADE OVERLAY
    ───────────────────────────────────────── */
    .upgrade-overlay {
      position: fixed; inset: 0;
      background: rgba(7,7,7,.92);
      z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; text-align: center; padding: 32px;
      backdrop-filter: blur(4px);
      opacity: 0; pointer-events: none;
      transition: opacity .3s ease;
    }
    .upgrade-overlay.show { opacity: 1; pointer-events: all; }
    .upgrade-icon { font-size: 2.4rem; color: var(--gold); opacity: .6; }
    .upgrade-title { font-family: var(--serif); font-size: 1.3rem; color: var(--white); font-weight: 300; }
    .upgrade-desc { font-size: .84rem; color: rgba(208,208,208,.55); max-width: 360px; line-height: 1.9; }
    .upgrade-btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 36px;
      background: var(--gold); color: var(--black);
      font-size: .75rem; letter-spacing: .18em; text-transform: uppercase;
      font-weight: 700; border: none; cursor: pointer;
      transition: background .2s, transform .15s;
    }
    .upgrade-btn:hover { background: var(--gold-lt); transform: translateY(-1px); }
    .upgrade-dismiss {
      font-size: .68rem; color: rgba(208,208,208,.3);
      letter-spacing: .1em; cursor: pointer; text-decoration: underline;
      text-underline-offset: 3px;
    }
    .upgrade-dismiss:hover { color: rgba(208,208,208,.6); }

    /* ─────────────────────────────────────────
       TOAST
    ───────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%);
      background: #0d0d0d;
      border: 1px solid rgba(184,151,90,.4);
      padding: 14px 28px;
      color: var(--gold);
      font-size: .82rem;
      letter-spacing: .06em;
      z-index: 9999;
      animation: toastIn .35s cubic-bezier(.16,1,.3,1) both;
      min-width: 240px;
      text-align: center;
      border-radius: 4px;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(12px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ─────────────────────────────────────────
       ENGINE OPTIONS PANEL
    ───────────────────────────────────────── */
    .eng-options-panel {
      margin: 8px 10px 4px;
      background: rgba(184,151,90,.04);
      border: 1px solid rgba(184,151,90,.2);
      border-radius: 7px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .eng-options-header {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px;
      cursor: pointer;
      user-select: none;
      transition: background .2s;
    }
    .eng-options-header:hover { background: rgba(184,151,90,.06); }
    .eng-options-title {
      flex: 1;
      font-size: .62rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .eng-options-arrow {
      font-size: .55rem;
      color: rgba(184,151,90,.6);
      transition: transform .25s;
    }
    .eng-options-panel.collapsed .eng-options-arrow { transform: rotate(-90deg); }
    .eng-options-body {
      padding: 8px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-top: 1px solid rgba(184,151,90,.12);
    }
    .eng-options-panel.collapsed .eng-options-body { display: none; }
    .opt-row { display: flex; flex-direction: column; gap: 5px; }
    .opt-label {
      font-size: .56rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(208,208,208,.45);
    }
    .opt-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .opt-chip {
      padding: 4px 10px;
      border: 1px solid rgba(184,151,90,.25);
      border-radius: 3px;
      background: transparent;
      color: rgba(208,208,208,.55);
      font-family: var(--sans);
      font-size: .65rem;
      cursor: pointer;
      transition: all .18s;
    }
    .opt-chip:hover { border-color: rgba(184,151,90,.5); color: var(--gold); }
    .opt-chip.selected {
      background: rgba(184,151,90,.15);
      border-color: var(--gold);
      color: var(--gold);
    }
    .opt-toggle-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .opt-toggle-label {
      font-size: .68rem;
      color: rgba(208,208,208,.6);
    }
    .opt-toggle {
      position: relative;
      width: 34px; height: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .opt-toggle input { opacity: 0; width: 0; height: 0; }
    .opt-toggle-track {
      position: absolute; inset: 0;
      background: rgba(255,255,255,.1);
      border-radius: 18px;
      transition: background .2s;
    }
    .opt-toggle input:checked + .opt-toggle-track { background: var(--gold); }
    .opt-toggle-thumb {
      position: absolute;
      top: 2px; left: 2px;
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    .opt-toggle input:checked ~ .opt-toggle-thumb { transform: translateX(16px); }
    .opt-slider-wrap { display: flex; align-items: center; gap: 8px; }
    .opt-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      background: rgba(255,255,255,.12);
      border-radius: 2px;
      outline: none;
    }
    .opt-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
    }
    .opt-slider-val {
      font-size: .65rem;
      color: var(--gold);
      min-width: 28px;
      text-align: right;
    }
    .opt-select {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(184,151,90,.25);
      color: var(--white);
      padding: 6px 10px;
      font-family: var(--sans);
      font-size: .7rem;
      border-radius: 3px;
      outline: none;
      appearance: none;
      cursor: pointer;
    }
    .opt-select:focus { border-color: rgba(184,151,90,.55); }

    /* ─────────────────────────────────────────
       FILE ATTACH
    ───────────────────────────────────────── */
    .attach-btn {
      width: 34px; height: 34px;
      background: transparent;
      border: 1px solid rgba(184,151,90,.35);
      border-radius: 7px;
      color: var(--gold);
      cursor: pointer;
      display: grid; place-items: center;
      font-size: .9rem;
      flex-shrink: 0;
      transition: background .2s, border-color .2s;
    }
    .attach-btn:hover { background: rgba(184,151,90,.08); border-color: var(--gold); }

    .attach-preview-area {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px 0 4px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .attach-preview-area:empty { display: none; }

    .attach-thumb {
      position: relative;
      display: flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(184,151,90,.25);
      border-radius: 8px;
      padding: 5px 8px 5px 5px;
      max-width: 180px;
    }
    .attach-thumb-img {
      width: 60px; height: 60px;
      object-fit: cover;
      border-radius: 5px;
      flex-shrink: 0;
    }
    .attach-thumb-icon {
      width: 44px; height: 44px;
      border-radius: 5px;
      background: rgba(184,151,90,.1);
      border: 1px solid rgba(184,151,90,.25);
      display: grid; place-items: center;
      font-size: 1.1rem;
      color: var(--gold);
      flex-shrink: 0;
    }
    .attach-thumb-info {
      flex: 1; min-width: 0;
    }
    .attach-thumb-name {
      font-size: .68rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100px;
    }
    .attach-thumb-size {
      font-size: .58rem;
      color: rgba(208,208,208,.4);
      margin-top: 2px;
    }
    .attach-thumb-del {
      position: absolute;
      top: -6px; right: -6px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #cc4444;
      border: none;
      color: #fff;
      font-size: .55rem;
      cursor: pointer;
      display: grid; place-items: center;
      line-height: 1;
      transition: background .15s;
    }
    .attach-thumb-del:hover { background: #e05555; }

    /* ─────────────────────────────────────────
       DROP ZONE
    ───────────────────────────────────────── */
    #drop-zone {
      margin: 0 0 10px 0;
      border: 1.5px dashed rgba(184,151,90,0.3);
      border-radius: 10px;
      background: rgba(184,151,90,0.03);
      min-height: 88px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
      overflow: hidden;
      padding: 10px 14px;
      gap: 0;
    }
    #drop-zone:hover,
    #drop-zone.drag-over {
      border-color: var(--gold);
      background: rgba(184,151,90,0.07);
    }
    #drop-zone.drag-over {
      border-color: var(--gold-lt);
    }
    #drop-zone.has-files {
      justify-content: flex-start;
      padding: 10px 12px;
      min-height: 0;
    }
    .drop-zone-hint {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      pointer-events: none;
      user-select: none;
    }
    .drop-zone-icon {
      font-size: 1.5rem;
      color: rgba(184,151,90,0.45);
    }
    .drop-zone-text {
      font-size: .72rem;
      color: rgba(208,208,208,0.4);
      text-align: center;
      line-height: 1.6;
      letter-spacing: .02em;
    }
    .drop-zone-text strong {
      color: rgba(184,151,90,0.7);
    }
    .drop-zone-thumbs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      width: 100%;
    }

    /* Attached file display in chat bubble */
    .msg-attach-files {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-bottom: 8px;
    }
    .msg-attach-img {
      width: 80px; height: 80px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid rgba(184,151,90,.25);
    }
    .msg-attach-doc {
      display: flex; align-items: center; gap: 6px;
      background: rgba(184,151,90,.07);
      border: 1px solid rgba(184,151,90,.2);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: .72rem;
      color: var(--gold);
    }
    .msg-attach-doc i { font-size: .8rem; }

    /* ─────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────── */
    @media (max-width: 768px) {
      #sidebar { display: none; }
      #sidebar.mobile-open { display: flex; position: fixed; z-index: 200; height: 100vh; }
      #mobile-menu-btn { display: flex; }

      width: 36px; height: 36px;

      border: 1px solid rgba(255,255,255,.1);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      place-items: center;
      font-size: .9rem;
    }
  </style>
</head>

<script>
// ═══════════════════════════════════════════════
//  ENGINE OPTIONS
// ═══════════════════════════════════════════════
const ENGINE_OPTIONS = {
  'GPT-5.2': [
    { type: 'chip', label: '디자인 톤', key: 'tone', values: ['모던', '클래식', '미니멀', '컬러풀'], default: '모던' },
    { type: 'toggle', label: '차트 포함', key: 'chart', default: true },
  ],
};

let currentEngineOptions = {};

function renderEngineOptions(engineName) {
  const panel = document.getElementById('engOptionsPanel');
  const body = document.getElementById('engOptionsBody');
  const titleEl = document.getElementById('engOptionsTitleText');
  const opts = ENGINE_OPTIONS[engineName];
  if (!opts || opts.length === 0) { panel.style.display = 'none'; return; }
  panel.style.display = '';
  titleEl.textContent = engineName + ' 설정';
  body.innerHTML = '';
  currentEngineOptions = {};
  opts.forEach(opt => {
    currentEngineOptions[opt.key] = opt.default !== undefined ? opt.default : (opt.values ? opt.values[0] : false);
    const row = document.createElement('div');
    row.className = 'opt-row';
    if (opt.type === 'chip') {
      row.innerHTML = '<span class="opt-label">' + opt.label + '</span><div class="opt-chips" data-key="' + opt.key + '"></div>';
      body.appendChild(row);
      const chipsEl = row.querySelector('.opt-chips');
      opt.values.forEach(v => {
        const btn = document.createElement('button');
        btn.className = 'opt-chip' + (v === (opt.default || opt.values[0]) ? ' selected' : '');
        btn.textContent = v;
        btn.onclick = function() {
          chipsEl.querySelectorAll('.opt-chip').forEach(c => c.classList.remove('selected'));
          btn.classList.add('selected');
          currentEngineOptions[opt.key] = v;
        };
        chipsEl.appendChild(btn);
      });
    } else if (opt.type === 'toggle') {
      const id = 'opt_toggle_' + opt.key;
      row.innerHTML = '<div class="opt-toggle-row"><span class="opt-toggle-label">' + opt.label + '</span><label class="opt-toggle"><input type="checkbox" id="' + id + '"' + (opt.default ? ' checked' : '') + '><span class="opt-toggle-track"></span><span class="opt-toggle-thumb"></span></label></div>';
      body.appendChild(row);
      row.querySelector('input').onchange = function() { currentEngineOptions[opt.key] = this.checked; };
    } else if (opt.type === 'slider') {
      const id = 'opt_slider_' + opt.key;
      const val = opt.default !== undefined ? opt.default : opt.min;
      row.innerHTML = '<span class="opt-label">' + opt.label + '</span><div class="opt-slider-wrap"><input class="opt-slider" type="range" id="' + id + '" min="' + opt.min + '" max="' + opt.max + '" step="' + (opt.step || 1) + '" value="' + val + '"><span class="opt-slider-val" id="' + id + '_val">' + val + '</span></div>';
      body.appendChild(row);
      const inp = row.querySelector('input');
      const valEl = row.querySelector('.opt-slider-val');
      inp.oninput = function() { valEl.textContent = this.value; currentEngineOptions[opt.key] = this.value; };
    } else if (opt.type === 'select') {
      row.innerHTML = '<span class="opt-label">' + opt.label + '</span><select class="opt-select">' + opt.values.map(v => '<option' + (v === opt.default ? ' selected' : '') + '>' + v + '</option>').join('') + '</select>';
      body.appendChild(row);
      row.querySelector('select').onchange = function() { currentEngineOptions[opt.key] = this.value; };
    }
  });
}

function toggleEngOptions() {
  document.getElementById('engOptionsPanel').classList.toggle('collapsed');
}

function getEngineOptionsPrompt() {
  const parts = [];
  Object.entries(currentEngineOptions).forEach(([k, v]) => {
    if (v !== false && v !== '' && v !== null) {
      const label = k.charAt(0).toUpperCase() + k.slice(1);
      parts.push('[' + label + ': ' + v + ']');
    }
  });
  return parts.length ? ' ' + parts.join(' ') : '';
}

// ═══════════════════════════════════════════════

function loadConversations() {
  try {
    return JSON.parse(localStorage.getItem(CONV_STORAGE_KEY) || '[]');
  } catch(e) { return []; }
}

function saveConversations(convs) {
  localStorage.setItem(CONV_STORAGE_KEY, JSON.stringify(convs));
}

function saveCurrentConv() {
  if (!currentConvId || messages.length === 0) return;
  const convs = loadConversations();
  const idx = convs.findIndex(c => c.id === currentConvId);
  const firstUser = messages.find(m => m.role === 'user');
  const title = firstUser
    ? (typeof firstUser.content === 'string' ? firstUser.content.slice(0, 30) : '제안서 대화')
    : '새 대화';
  const conv = { id: currentConvId, title, messages: messages, ts: Date.now() };
  if (idx >= 0) convs[idx] = conv;
  else convs.unshift(conv);
  // Keep max 20 conversations
  if (convs.length > 20) convs.splice(20);
  saveConversations(convs);
  renderConvList();
}

function renderConvList() {
  const convs = loadConversations();
  const container = document.getElementById('convList');
  const emptyEl = document.getElementById('convEmpty');
  const clearBtn = document.getElementById('convClearBtn');
  container.querySelectorAll('.conv-item').forEach(el => el.remove());

  if (convs.length === 0) {
    emptyEl.style.display = '';
    if (clearBtn) clearBtn.style.display = 'none';
    return;
  }
  emptyEl.style.display = 'none';
  if (clearBtn) clearBtn.style.display = '';

  convs.forEach(conv => {
    const item = document.createElement('div');
    item.className = 'conv-item' + (conv.id === currentConvId ? ' active' : '');
    item.innerHTML = `<i class="fa-regular fa-file-lines"></i><span class="conv-item-text">${escapeHtml(conv.title)}</span><span class="conv-item-del" title="삭제"><i class="fa-solid fa-xmark"></i></span>`;
    item.querySelector('.conv-item-del').addEventListener('click', (e) => {
      e.stopPropagation();
      deleteConversation(conv.id);
    });
    item.addEventListener('click', () => loadConversation(conv.id));
    container.appendChild(item);
  });
}

function deleteConversation(id) {
  let convs = loadConversations();
  convs = convs.filter(c => c.id !== id);
  saveConversations(convs);
  if (currentConvId === id) {
    messages = [];
    currentConvId = null;
    const container = document.getElementById('messages');
    container.querySelectorAll('.msg-row').forEach(el => el.remove());
    document.getElementById('emptyState').style.display = '';
  }
  renderConvList();
}

function clearAllConversations() {
  if (!confirm('모든 대화 기록을 삭제하시겠습니까?')) return;
  localStorage.removeItem(CONV_STORAGE_KEY);
  messages = [];
  currentConvId = null;
  const container = document.getElementById('messages');
  container.querySelectorAll('.msg-row').forEach(el => el.remove());
  document.getElementById('emptyState').style.display = '';
  renderConvList();
}

function loadConversation(id) {
  const convs = loadConversations();
  const conv = convs.find(c => c.id === id);
  if (!conv) return;

  currentConvId = id;
  messages = conv.messages || [];

  // Re-render messages
  const container = document.getElementById('messages');
  container.querySelectorAll('.msg-row').forEach(el => el.remove());
  document.getElementById('emptyState').style.display = 'none';

  messages.forEach(m => {
    if (m.role === 'user') {
      appendUserBubble(typeof m.content === 'string' ? m.content : '', null);
    } else if (m.role === 'assistant') {
      appendAIBubble(m.content, true);
    }
  });
  renderConvList();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── helpers ─────────────────────────────────── */
function getDateStr() {
  const d = new Date();
  return d.getFullYear().toString()
    + String(d.getMonth() + 1).padStart(2, '0')
    + String(d.getDate()).padStart(2, '0');
}

// Strip markdown to plain text for PPT
function stripMd(str) {
  return str
    .replace(/\*\*(.+?)\*\*/g, '$1')
    .replace(/\*(.+?)\*/g, '$1')
    .replace(/__(.+?)__/g, '$1')
    .replace(/_(.+?)_/g, '$1')
    .replace(/~~(.+?)~~/g, '$1')
    .replace(/`(.+?)`/g, '$1')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/^#{1,6}\s+/gm, '')
    .replace(/^[-*+]\s+/gm, '• ')
    .replace(/^\d+\.\s+/gm, '')
    .replace(/\|[^\n]+\|/g, '')        // table rows
    .replace(/^[-:| ]+$/gm, '')        // table separators
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

// Collect current proposal slides from the last AI message slide cards
function collectSlides() {
  // Prefer in-memory messages data
  const lastAI = [...messages].reverse().find(m => m.role === 'assistant');
  if (lastAI && lastAI.content) {
    const parsed = parseSlides(lastAI.content);
    if (parsed && parsed.length > 0) return parsed;
  }
  // Fallback: scrape DOM slide cards
  const cards = document.querySelectorAll('.slide-card');
  if (cards.length === 0) return null;
  return Array.from(cards).map((card, i) => {
    const num = card.querySelector('.slide-card-num')?.textContent?.trim() || String(i + 1);
    const title = card.querySelector('.slide-card-title')?.textContent?.trim() || '';
    const body = card.querySelector('.slide-card-body')?.innerText?.trim() || '';
    return { num, title, body };
  });
}

/* ── PPT export ───────────────────────────────── */
function doExportPPT() {

    return;

  pptx.layout = 'LAYOUT_WIDE'; // 16:9

  const BG      = '1a1a1a';
  const GOLD    = 'b8975a';
  const GOLD_LT = 'd4af70';
  const WHITE   = 'ffffff';
  const SILVER  = 'c8c8c8';
  const DARK2   = '111111';

  // Get project title from first slide or first user message
  const firstUser = messages.find(m => m.role === 'user');
  let projectTitle = '';
  if (firstUser) {
    const raw = typeof firstUser.content === 'string'
      ? firstUser.content
      : (Array.isArray(firstUser.content) ? (firstUser.content.find(p => p.type === 'text')?.text || '') : '');
    projectTitle = raw.split('\n')[0].replace(/\[.*?\]/g, '').trim().slice(0, 50);
  }
  if (!projectTitle) projectTitle = slides[0].title;

  // ── Cover slide ──────────────────────────────
  const cover = pptx.addSlide();
  cover.background = { color: BG };

  // Top gold bar
  cover.addShape(pptx.ShapeType.rect, {
    x: 0, y: 0, w: '100%', h: 0.06,
    fill: { color: GOLD },
    line: { color: GOLD, width: 0 }
  });
  // Bottom gold bar
  cover.addShape(pptx.ShapeType.rect, {
    x: 0, y: 7.44, w: '100%', h: 0.06,
    fill: { color: GOLD },
    line: { color: GOLD, width: 0 }
  });

  // DAGAON AI label
  cover.addText('DAGAON AI', {
    x: 0, y: 1.2, w: '100%', h: 0.4,
    fontSize: 13,
    color: GOLD,
    bold: false,
    align: 'center',
    fontFace: 'Malgun Gothic',
    charSpacing: 8,
  });

  // Divider line
  cover.addShape(pptx.ShapeType.line, {
    x: 3.5, y: 1.75, w: 6.5, h: 0,
    line: { color: GOLD, width: 1 }
  });

  // Main title
  cover.addText('제안서', {
    x: 0, y: 1.9, w: '100%', h: 0.6,
    fontSize: 32,
    color: WHITE,
    bold: true,
    align: 'center',
    fontFace: 'Malgun Gothic',
  });

  // Project title
  cover.addText(projectTitle, {
    x: 0.5, y: 2.65, w: 12.5, h: 0.7,
    fontSize: 20,
    color: GOLD_LT,
    bold: false,
    align: 'center',
    fontFace: 'Malgun Gothic',
    charSpacing: 1,
  });

  // Divider line 2
  cover.addShape(pptx.ShapeType.line, {
    x: 3.5, y: 3.5, w: 6.5, h: 0,
    line: { color: GOLD, width: 0.5, dashType: 'dash' }
  });

  // DAGAON branding footer
  cover.addText('Presented by DAGAON AI  |  ' + new Date().getFullYear(), {
    x: 0, y: 6.9, w: '100%', h: 0.35,
    fontSize: 9,
    color: '666666',
    align: 'center',
    fontFace: 'Malgun Gothic',
    charSpacing: 2,
  });

  // ── Content slides ────────────────────────────
  slides.forEach((slide, idx) => {
    const sld = pptx.addSlide();
    sld.background = { color: BG };

    // Top accent bar
    sld.addShape(pptx.ShapeType.rect, {
      x: 0, y: 0, w: '100%', h: 0.055,
      fill: { color: GOLD },
      line: { color: GOLD, width: 0 }
    });

    // Slide number badge (left sidebar)
    sld.addShape(pptx.ShapeType.rect, {
      x: 0, y: 0, w: 0.55, h: '100%',
      fill: { color: DARK2 },
      line: { color: DARK2, width: 0 }
    });
    sld.addText(String(slide.num).padStart(2, '0'), {
      x: 0, y: 3.4, w: 0.55, h: 0.5,
      fontSize: 11,
      color: GOLD,
      bold: true,
      align: 'center',
      fontFace: 'Malgun Gothic',
      rotate: 0,
    });

    sld.addShape(pptx.ShapeType.rect, {
      x: 0.55, y: 0.055, w: 12.95, h: 1.1,
      fill: { color: '111111' },
      line: { color: '111111', width: 0 }
    });

      x: 0.75, y: 0.18, w: 12.5, h: 0.8,
      fontSize: 22,
      color: WHITE,
      bold: true,
      align: 'left',
      fontFace: 'Malgun Gothic',
    });

    // Gold underline under title
    sld.addShape(pptx.ShapeType.line, {
      x: 0.75, y: 1.08, w: 3.5, h: 0,
      line: { color: GOLD, width: 2 }
    });

    // Body text
    const rawBody = stripMd(slide.body);
    const lines = rawBody.split('\n').filter(l => l.trim());

    // Build rich text array for body
    const textItems = [];
    lines.forEach((line, li) => {
      const isBullet = line.startsWith('•');
      const clean = line.replace(/^•\s*/, '').trim();
      if (!clean) return;
      textItems.push({
        text: (isBullet ? '  •  ' : '') + clean,
        options: {
          fontSize: isBullet ? 13 : 14,
          color: isBullet ? SILVER : WHITE,
          bold: !isBullet && li === 0,
          breakLine: true,
          paraSpaceAfter: isBullet ? 4 : 8,
          fontFace: 'Malgun Gothic',
          bullet: false,
          indentLevel: isBullet ? 1 : 0,
        }
      });
    });

    if (textItems.length > 0) {
      sld.addText(textItems, {
        x: 0.75, y: 1.25, w: 12.2, h: 5.9,
        valign: 'top',
        wrap: true,
        fontFace: 'Malgun Gothic',

    // Bottom strip
    sld.addShape(pptx.ShapeType.rect, {
      x: 0, y: 7.3, w: '100%', h: 0.2,
      fill: { color: '0a0a0a' },
      line: { color: '0a0a0a', width: 0 }

      color: '444444',
      align: 'right',
      fontFace: 'Malgun Gothic',
    });

  const filename = 'DAGAON_AI_제안서_' + getDateStr() + '.pptx';
  pptx.writeFile({ fileName: filename })

    .catch(err => {
      console.error('PPT export error:', err);
      showToast('PPT 저장 중 오류가 발생했습니다.');
    });
}

// ═══════════════════════════════════════════════
//  FILE ATTACH — STATE
// ═══════════════════════════════════════════════
// Each entry: { file, name, size, type, dataUrl, text }
// type: 'image' | 'pdf' | 'text'
let attachedFiles = [];
const MAX_FILES = 5;
const MAX_IMAGE_BYTES = 20 * 1024 * 1024;
const MAX_DOC_BYTES   = 10 * 1024 * 1024;

// ═══════════════════════════════════════════════
//  FILE ATTACH — INIT
// ═══════════════════════════════════════════════
(function initFileAttach() {
  const attachBtn  = document.getElementById('attach-btn');
  const fileInput  = document.getElementById('file-input');

  // pdf.js worker
  if (window.pdfjsLib) {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }

  attachBtn.addEventListener('click', () => {
    fileInput.value = '';          // allow re-selecting same file
    fileInput.click();
  });

  fileInput.addEventListener('change', (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;

    const remaining = MAX_FILES - attachedFiles.length;
    if (remaining <= 0) { showToast(`최대 ${MAX_FILES}개 파일까지 첨부할 수 있습니다.`); return; }

    files.slice(0, remaining).forEach(f => processFile(f));
  });
})();

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + 'KB';
  return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
}

function getFileType(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (['jpg','jpeg','png','webp','gif'].includes(ext) || file.type.startsWith('image/')) return 'image';
  if (ext === 'pdf' || file.type === 'application/pdf') return 'pdf';
  return 'text'; // txt, doc, docx treated as text (best-effort)
}

function processFile(file) {
  const ftype = getFileType(file);
  const limit = (ftype === 'image') ? MAX_IMAGE_BYTES : MAX_DOC_BYTES;
  if (file.size > limit) {
    showToast(`${file.name}: 파일 크기 초과 (${formatBytes(limit)} 제한)`);
    return;
  }

  if (ftype === 'image') {
    const reader = new FileReader();
    reader.onload = (e) => {
      const entry = { file, name: file.name, size: file.size, type: 'image', dataUrl: e.target.result, text: null };
      attachedFiles.push(entry);
      renderAttachPreview();
    };
    reader.readAsDataURL(file);

  } else if (ftype === 'pdf') {
    const reader = new FileReader();
    reader.onload = async (e) => {
      let extractedText = '';
      try {
        if (window.pdfjsLib) {
          const loadingTask = pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) });
          const pdf = await loadingTask.promise;
          const maxPages = Math.min(pdf.numPages, 20); // 최대 20페이지
          for (let i = 1; i <= maxPages; i++) {
            const page = await pdf.getPage(i);
            const tc = await page.getTextContent();
            extractedText += tc.items.map(item => item.str).join(' ') + '\n';
          }
        } else {
          extractedText = '[PDF 텍스트 추출 불가 - pdf.js 로드 실패]';
        }
      } catch (err) {
        extractedText = '[PDF 텍스트 추출 오류: ' + err.message + ']';
      }
      const entry = { file, name: file.name, size: file.size, type: 'pdf', dataUrl: null, text: extractedText.trim() };
      attachedFiles.push(entry);
      renderAttachPreview();
    };
    reader.readAsArrayBuffer(file);

  } else {
    // txt / doc / docx — best-effort text read
    const reader = new FileReader();
    reader.onload = (e) => {
      const entry = { file, name: file.name, size: file.size, type: 'text', dataUrl: null, text: e.target.result };
      attachedFiles.push(entry);
      renderAttachPreview();
    };
    reader.readAsText(file, 'UTF-8');
  }
}

function renderAttachPreview() {
  const area = document.getElementById('attach-preview-area');
  area.innerHTML = '';
  attachedFiles.forEach((entry, idx) => {
    const thumb = document.createElement('div');
    thumb.className = 'attach-thumb';

    if (entry.type === 'image') {
      const img = document.createElement('img');
      img.className = 'attach-thumb-img';
      img.src = entry.dataUrl;
      img.alt = entry.name;
      thumb.appendChild(img);
    } else {
      const icon = document.createElement('div');
      icon.className = 'attach-thumb-icon';
      icon.innerHTML = entry.type === 'pdf'
        ? '<i class="fa-regular fa-file-pdf"></i>'
        : '<i class="fa-regular fa-file-lines"></i>';
      thumb.appendChild(icon);
    }

    const info = document.createElement('div');
    info.className = 'attach-thumb-info';
    info.innerHTML = `<div class="attach-thumb-name">${escapeHtml(entry.name)}</div><div class="attach-thumb-size">${formatBytes(entry.size)}</div>`;
    thumb.appendChild(info);

    const delBtn = document.createElement('button');
    delBtn.className = 'attach-thumb-del';
    delBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
    delBtn.title = '삭제';
    delBtn.onclick = () => removeAttachedFile(idx);
    thumb.appendChild(delBtn);

    area.appendChild(thumb);
  });
}

function removeAttachedFile(idx) {
  attachedFiles.splice(idx, 1);
  renderAttachPreview();
}

function clearAttachedFiles() {
  attachedFiles = [];
  const area = document.getElementById('attach-preview-area');
  if (area) area.innerHTML = '';
}

// ═══════════════════════════════════════════════
//  SEND MESSAGE
// ═══════════════════════════════════════════════
async function sendMessage() {
  if (isStreaming) return;

  const text = textarea.value.trim();
  const hasFiles = attachedFiles.length > 0;
  if (!text && !hasFiles) return;

  // Append engine options to user message
  const optPrompt = getEngineOptionsPrompt();
  const baseText = text || '';
  const finalText = baseText + (optPrompt ? '\n' + optPrompt : '');

  // Credit check for members
  if (isMember && !isAdmin) {
    const credits = getCredits();
    if (credits < CREDIT_PER_MSG) {
      showToast('크레딧이 부족합니다. 플랜을 업그레이드하세요.');
      document.getElementById('upgradeOverlay').classList.add('show');
      return;
    }
  }

  // Init conversation if needed
  if (!currentConvId) {
    currentConvId = 'conv_' + Date.now();
  }

  // Hide empty state
  document.getElementById('emptyState').style.display = 'none';

  // ── Build API message content ──
  // Snapshot files before clearing
  const filesToSend = attachedFiles.slice();

  // Build text context from documents/PDFs
  let docContext = '';
  filesToSend.forEach(entry => {
    if ((entry.type === 'pdf' || entry.type === 'text') && entry.text) {
      docContext += `[참고 자료: ${entry.name}]\n${entry.text}\n[/참고 자료]\n\n`;
    }
  });

  const combinedText = docContext ? docContext + finalText : finalText;

  // Build content array for API (multimodal if images present)
  const imageEntries = filesToSend.filter(e => e.type === 'image');
  let apiContent;
  if (imageEntries.length > 0) {
    const parts = [];
    if (combinedText) parts.push({ type: 'text', text: combinedText });
    imageEntries.forEach(entry => {
      parts.push({ type: 'image_url', image_url: { url: entry.dataUrl } });
    });
    apiContent = parts;
  } else {
    apiContent = combinedText;
  }

  const userMsg = { role: 'user', content: apiContent };
  messages.push(userMsg);

  // Show user bubble with display text + file thumbnails
  appendUserBubble(baseText, filesToSend);
  textarea.value = '';
  autoResize();
  clearAttachedFiles();

  // Deduct credits
  if (isMember && !isAdmin) {
    saveCredits(getCredits() - CREDIT_PER_MSG);
    refreshUsageBadge();
  }

  // Disable send
  const sendBtn = document.getElementById('send-btn');
  sendBtn.disabled = true;
  isStreaming = true;

  // Show typing bubble
  const typingEl = appendTypingBubble();

  try {
    const reply = await streamOpenAI(messages);
    typingEl.remove();
    appendAIBubble(reply, false);
    messages.push({ role: 'assistant', content: reply });
    saveCurrentConv();
  } catch (err) {
    typingEl.remove();
    const errMsg = err.message || '오류가 발생했습니다.';
    appendAIBubble(`**오류:** ${errMsg}\n\n잠시 후 다시 시도해주세요.`, false);
    // Refund credits on error
    if (isMember && !isAdmin) {
      saveCredits(getCredits() + CREDIT_PER_MSG);
      refreshUsageBadge();
    }
    console.error('API error:', err);
  } finally {
    sendBtn.disabled = false;
    isStreaming = false;
    if (isMember && !isAdmin && getCredits() <= 0) {
      setTimeout(() => document.getElementById('upgradeOverlay').classList.add('show'), 1500);
    }
  }
}

// ═══════════════════════════════════════════════
//  OpenAI STREAMING
// ═══════════════════════════════════════════════
async function streamOpenAI(msgs) {
  const apiMessages = [
    { role: 'system', content: SYSTEM_PROMPT },
    ...msgs.map(m => ({ role: m.role, content: m.content })),
  ];

  const resp = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${OPENAI_API_KEY}`,
    },
    body: JSON.stringify({
      model: currentModel,
      messages: apiMessages,
      stream: true,
      temperature: 0.7,
      max_tokens: 4096,
    }),
  });

  if (!resp.ok) {
    const errJson = await resp.json().catch(() => ({}));
    throw new Error(errJson.error?.message || `HTTP ${resp.status}`);
  }

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let fullText = '';
  let aiBubble = null;

  // Remove typing indicator and create streaming bubble
  const typingEl = document.querySelector('.typing-bubble');
  if (typingEl) typingEl.remove();
  aiBubble = createStreamingBubble();

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    const chunk = decoder.decode(value, { stream: true });
    const lines = chunk.split('\n');

    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed.startsWith('data:')) continue;
      const data = trimmed.slice(5).trim();
      if (data === '[DONE]') break;
      try {
        const json = JSON.parse(data);
        const delta = json.choices?.[0]?.delta?.content;
        if (delta) {
          fullText += delta;
          renderStreamingBubble(aiBubble, fullText);
        }
      } catch {}
    }
  }

  return fullText;
}

// ═══════════════════════════════════════════════
//  SLIDE PARSING
// ═══════════════════════════════════════════════
// Parse text into slides if it contains [슬라이드 N: ...] markers
function parseSlides(text) {
  const slidePattern = /\[슬라이드\s*(\d+)\s*:\s*([^\]]+)\]/g;
  const matches = [...text.matchAll(slidePattern)];
  if (matches.length === 0) return null;

  const slides = [];
  for (let i = 0; i < matches.length; i++) {
    const match = matches[i];
    const num = match[1];
    const title = match[2].trim();
    const start = match.index + match[0].length;
    const end = i + 1 < matches.length ? matches[i + 1].index : text.length;
    const body = text.slice(start, end).trim();
    slides.push({ num, title, body });
  }
  return slides;
}

// Render slide cards HTML
function renderSlideCards(slides) {
  const wrapper = document.createElement('div');
  wrapper.className = 'slide-cards-wrapper';
  slides.forEach(slide => {
    const card = document.createElement('div');
    card.className = 'slide-card';
    card.innerHTML = `
      <div class="slide-card-header">
        <div class="slide-card-num">${slide.num}</div>
        <div class="slide-card-title">${escapeHtml(slide.title)}</div>
      </div>
      <div class="slide-card-body">${marked.parse(slide.body)}</div>
    `;
    wrapper.appendChild(card);
  });
  return wrapper;
}

function createStreamingBubble() {
  const container = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row';

  const av = document.createElement('div');
  av.className = 'msg-avatar ai';
  av.innerHTML = '<i class="fa-solid fa-file-lines"></i>';

  bubble.className = 'msg-bubble ai streaming-bubble';

  row.appendChild(av);
  row.appendChild(bubble);
  container.appendChild(row);
  scrollToBottom();
  return bubble;
}

function renderStreamingBubble(bubbleEl, text) {
  const slides = parseSlides(text);
  if (slides && slides.length > 0) {
    // Render any text before first slide marker
    const firstSlideIdx = text.indexOf('[슬라이드');
    const preText = firstSlideIdx > 0 ? text.slice(0, firstSlideIdx).trim() : '';
    bubbleEl.innerHTML = '';
    if (preText) {
      const pre = document.createElement('div');
      pre.innerHTML = marked.parse(preText);
      bubbleEl.appendChild(pre);
    }
    bubbleEl.appendChild(renderSlideCards(slides));
  } else {
    bubbleEl.innerHTML = marked.parse(text);
  }
  scrollToBottom();
}

function appendAIBubble(text, skipSlideRender) {
  // Check if there's already a streaming bubble
  const existing = document.querySelector('.streaming-bubble');
  if (existing) {
    renderStreamingBubble(existing, text);
    existing.classList.remove('streaming-bubble');
    scrollToBottom();
    return;
  }
  const container = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row';
  const av = document.createElement('div');
  av.className = 'msg-avatar ai';
  av.innerHTML = '<i class="fa-solid fa-file-lines"></i>';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble ai';

  if (!skipSlideRender) {
    const slides = parseSlides(text);
    if (slides && slides.length > 0) {
      const firstSlideIdx = text.indexOf('[슬라이드');
      const preText = firstSlideIdx > 0 ? text.slice(0, firstSlideIdx).trim() : '';
      if (preText) {
        const pre = document.createElement('div');
        pre.innerHTML = marked.parse(preText);
        bubble.appendChild(pre);
      }
      bubble.appendChild(renderSlideCards(slides));
    } else {
      bubble.innerHTML = marked.parse(text);
    }
  } else {
    const slides = parseSlides(text);
    if (slides && slides.length > 0) {
      const firstSlideIdx = text.indexOf('[슬라이드');
      const preText = firstSlideIdx > 0 ? text.slice(0, firstSlideIdx).trim() : '';
      if (preText) {
        const pre = document.createElement('div');
        pre.innerHTML = marked.parse(preText);
        bubble.appendChild(pre);
      }
      bubble.appendChild(renderSlideCards(slides));
    } else {
      bubble.innerHTML = marked.parse(text);
    }
  }

  row.appendChild(av);
  row.appendChild(bubble);
  container.appendChild(row);
  scrollToBottom();
}

function scrollToBottom() {
  const container = document.getElementById('messages');
  container.scrollTop = container.scrollHeight;
}

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ═══════════════════════════════════════════════
//  MOBILE SIDEBAR TOGGLE
// ═══════════════════════════════════════════════
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('mobile-open');
}

// ═══════════════════════════════════════════════
//  MARKED CONFIG
// ═══════════════════════════════════════════════
marked.setOptions({
  breaks: true,
  gfm: true,
});

// ═══════════════════════════════════════════════
//  ENGINE TIER LOCK
// ═══════════════════════════════════════════════
(function initEngineLock() {
  var TIER_ORDER = { free: 0, basic: 2, standard: 2, pro: 3, enterprise: 3 };
  var plan = localStorage.getItem('dagaon_plan') || 'free';
  var isAdminFlag = localStorage.getItem('dagaon_admin') === '1';
  var userLevel = isAdminFlag ? 99 : (TIER_ORDER[plan] !== undefined ? TIER_ORDER[plan] : 0);
  document.querySelectorAll('.eng-item, .model-item, .engine-item').forEach(function(item) {
    var tier = item.getAttribute('data-tier');
    if (!tier) return;
    var required = TIER_ORDER[tier] !== undefined ? TIER_ORDER[tier] : 0;
    if (userLevel < required) {
      item.classList.add('locked');
      var nameEl = item.querySelector('.eng-name, .model-name, .engine-name');
      if (nameEl && !nameEl.querySelector('.eng-lock')) {
        var lockSpan = document.createElement('span');
        lockSpan.className = 'eng-lock';
        lockSpan.innerHTML = '<i class="fa-solid fa-lock"></i>';
        nameEl.appendChild(lockSpan);
      }
      var descEl = item.querySelector('.eng-desc, .model-desc, .engine-desc');
      if (descEl) {
        descEl.textContent = (required >= 3) ? 'Pro 플랜부터' : 'Standard 플랜부터';
      }
    }
  });
  window._showEngLockToast = function(tier) {
    var required = TIER_ORDER[tier] !== undefined ? TIER_ORDER[tier] : 0;
    var msg = (required >= 3) ? '이 엔진은 Pro 플랜부터 사용 가능합니다' : '이 엔진은 Standard 플랜부터 사용 가능합니다';
    var toast = document.getElementById('engLockToast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'engLockToast';
      toast.style.cssText = 'position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid rgba(184,151,90,.4);color:#d0c090;font-size:.78rem;padding:10px 22px;border-radius:6px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap;';
      document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.style.opacity = '1';
    clearTimeout(toast._t);
    toast._t = setTimeout(function() { toast.style.opacity = '0'; }, 2500);
  };
})();

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
// Render conversation history
renderConvList();

// Restore saved engine selection
(function restoreSavedEngine() {
  const savedEng = localStorage.getItem('dagaon_proposal_engine');
  const engItems = document.querySelectorAll('.engine-item');
  if (savedEng) {
    for (let i = 0; i < engItems.length; i++) {
      const nameEl = engItems[i].querySelector('.engine-name');
      if (nameEl && nameEl.textContent.trim() === savedEng && !engItems[i].classList.contains('locked')) {
        selectEngine(engItems[i]);
        return;
      }
    }
  }
  // Default: select the first unlocked engine
  for (let i = 0; i < engItems.length; i++) {
    if (!engItems[i].classList.contains('locked')) {
      selectEngine(engItems[i]);
      return;
    }
  }
  renderEngineOptions('GPT-5.2');
})();

// Start with a new chat (shows greeting after 300ms)
startNewChat();
</script>
